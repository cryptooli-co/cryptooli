<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" role="img" aria-label="Schéma d'un pool AMM : un utilisateur dépose 100 XRP et retire 91 tokens">
  <style>
    .lbl { font: 500 14px system-ui, sans-serif; fill: #e8ecf4; }
    .sub { font: 400 12px system-ui, sans-serif; fill: #8b96ad; }
    .big { font: 600 17px system-ui, sans-serif; fill: #e8ecf4; }
    .acc { font: 600 14px system-ui, sans-serif; fill: #2f7dff; }
    .box { fill: #101a2e; stroke: #1e2c46; stroke-width: 1.5; }
    .bar1 { fill: #2f7dff; }
    .bar2 { fill: #4b5f85; }
  </style>

  <!-- pool -->
  <rect class="box" x="230" y="60" width="240" height="200" rx="14"/>
  <text class="big" x="350" y="90" text-anchor="middle">Pool</text>

  <rect class="bar1" x="262" y="112" width="70" height="118" rx="6"/>
  <rect class="bar2" x="368" y="112" width="70" height="118" rx="6"/>

  <text class="lbl" x="297" y="176" text-anchor="middle" fill="#ffffff">1 000</text>
  <text class="sub" x="297" y="248" text-anchor="middle">XRP</text>
  <text class="lbl" x="403" y="176" text-anchor="middle">1 000</text>
  <text class="sub" x="403" y="248" text-anchor="middle">tokens</text>

  <!-- flèche entrante -->
  <path d="M 60 130 L 215 130" stroke="#2f7dff" stroke-width="2" fill="none"/>
  <path d="M 215 130 l -9 -5 v 10 z" fill="#2f7dff"/>
  <text class="acc" x="60" y="118">Vous déposez</text>
  <text class="sub" x="60" y="152">100 XRP</text>

  <!-- flèche sortante -->
  <path d="M 485 200 L 640 200" stroke="#2f7dff" stroke-width="2" fill="none"/>
  <path d="M 640 200 l -9 -5 v 10 z" fill="#2f7dff"/>
  <text class="acc" x="530" y="188">Vous recevez</text>
  <text class="sub" x="530" y="222">91 tokens</text>

  <text class="sub" x="350" y="292" text-anchor="middle">Aucune contrepartie humaine : le pool est toujours disponible.</text>
</svg>
