<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-label="Le protocole choisit automatiquement entre carnet d'ordres, AMM ou une combinaison des deux">
  <style>
    .ttl { font: 600 15px system-ui, sans-serif; fill: #e8ecf4; }
    .lbl { font: 600 13.5px system-ui, sans-serif; fill: #e8ecf4; }
    .sub { font: 400 12px system-ui, sans-serif; fill: #8b96ad; }
    .box { fill: #101a2e; stroke: #1e2c46; stroke-width: 1.5; }
    .acc { fill: #101a2e; stroke: #2f7dff; stroke-width: 2; }
  </style>

  <text class="ttl" x="55" y="30">Un seul ordre, trois sources de liquidité</text>

  <!-- ordre -->
  <rect class="acc" x="270" y="55" width="160" height="48" rx="10"/>
  <text class="lbl" x="350" y="85" text-anchor="middle" fill="#2f7dff">Votre ordre</text>

  <!-- branches -->
  <path d="M 320 103 L 165 145" stroke="#3a4762" stroke-width="1.5" fill="none"/>
  <path d="M 350 103 L 350 145" stroke="#3a4762" stroke-width="1.5" fill="none"/>
  <path d="M 380 103 L 535 145" stroke="#3a4762" stroke-width="1.5" fill="none"/>

  <rect class="box" x="55" y="148" width="215" height="82" rx="10"/>
  <text class="lbl" x="80" y="178">Carnet d'ordres</text>
  <text class="sub" x="80" y="202">Les offres placées par</text>
  <text class="sub" x="80" y="220">les autres participants</text>

  <rect class="box" x="288" y="148" width="125" height="82" rx="10"/>
  <text class="lbl" x="308" y="178">AMM</text>
  <text class="sub" x="308" y="202">Les pools de</text>
  <text class="sub" x="308" y="220">liquidité</text>

  <rect class="box" x="431" y="148" width="215" height="82" rx="10"/>
  <text class="lbl" x="456" y="178">Auto-bridging</text>
  <text class="sub" x="456" y="202">Les marchés reliés</text>
  <text class="sub" x="456" y="220">par le XRP</text>

  <text class="sub" x="350" y="266" text-anchor="middle">Le protocole compare les trois et exécute au meilleur prix,</text>
  <text class="sub" x="350" y="286" text-anchor="middle">en combinant plusieurs sources si nécessaire.</text>
</svg>
