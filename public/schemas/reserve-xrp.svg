<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" role="img" aria-label="Répartition d'un solde XRP entre réserve bloquée et solde disponible">
  <style>
    .ttl { font: 600 15px system-ui, sans-serif; fill: #e8ecf4; }
    .lbl { font: 600 13.5px system-ui, sans-serif; fill: #e8ecf4; }
    .sub { font: 400 12.5px system-ui, sans-serif; fill: #8b96ad; }
    .val { font: 600 15px system-ui, sans-serif; fill: #ffffff; }
  </style>

  <text class="ttl" x="60" y="32">Un compte avec 10 XRP, 3 trustlines et 1 offre</text>

  <!-- barre -->
  <rect x="60" y="70" width="580" height="58" rx="8" fill="#1b2740"/>
  <!-- base reserve : 1/10 -->
  <rect x="60" y="70" width="58" height="58" rx="8" fill="#d98a4a"/>
  <!-- owner reserve : 0.8/10 -->
  <rect x="118" y="70" width="46" height="58" fill="#8a6a4a"/>
  <!-- disponible -->
  <rect x="164" y="70" width="476" height="58" fill="#2f7dff"/>
  <rect x="620" y="70" width="20" height="58" rx="8" fill="#2f7dff"/>

  <text class="val" x="402" y="105" text-anchor="middle">7,8 XRP disponibles</text>

  <!-- legendes -->
  <line x1="89" y1="128" x2="89" y2="168" stroke="#d98a4a" stroke-width="1.5"/>
  <text class="lbl" x="60" y="188" fill="#d98a4a">1 XRP</text>
  <text class="sub" x="60" y="208">Réserve de base</text>
  <text class="sub" x="60" y="226">Bloquée tant que</text>
  <text class="sub" x="60" y="244">le compte existe.</text>

  <line x1="141" y1="128" x2="260" y2="168" stroke="#8a6a4a" stroke-width="1.5"/>
  <text class="lbl" x="255" y="188" fill="#b08a5e">0,8 XRP</text>
  <text class="sub" x="255" y="208">Réserve de propriétaire</text>
  <text class="sub" x="255" y="226">4 objets × 0,2 XRP</text>
  <text class="sub" x="255" y="244">Récupérable en les fermant.</text>

  <text class="sub" x="60" y="284">Montants en vigueur depuis décembre 2024. Les validateurs peuvent les modifier par vote.</text>
</svg>
